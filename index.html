<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>50 Ways Derivita Supports Teachers</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Interactive Guide</p>
        <h1>50 Ways Derivita Can Support Teachers</h1>
        <p>
          Explore practical classroom ideas, interventions, and workflows to
          help teachers save time and improve student outcomes.
        </p>
      </div>
      <button id="randomIdeaBtn" class="btn">Show me a random idea</button>
    </header>

    <main>
      <section class="controls">
        <label>
          Search ideas
          <input id="searchInput" type="text" placeholder="Try: assessments, algebra, intervention" />
        </label>

        <label>
          Filter by category
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </label>

        <div class="progress-wrap">
          <span id="selectedCount">0 selected</span>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
      </section>

      <section id="ideaGrid" class="idea-grid" aria-live="polite"></section>
    </main>

    <template id="ideaCardTemplate">
      <article class="idea-card">
        <div class="card-head">
          <span class="badge"></span>
          <label class="check-wrap">
            <input type="checkbox" />
            <span>Applied</span>
          </label>
        </div>
        <h2></h2>
        <p class="description"></p>
        <ul class="tags"></ul>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
